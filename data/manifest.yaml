# Public-data manifest for P2 (`multiqc-foundation-gate`) demo.
#
# Strategy: 4 cohorts x 5 SRR accessions = 20 base samples, augmented to 50
# total reports (module dropout + adapter injection) for the include /
# exclude / manual-review classifier.
#
# Each SRR is downloaded as a paired-end FASTQ pair, stream-and-downsampled
# to 100k reads each (= 400k lines in the gzipped FASTQ) so the total raw
# data plane stays under ~100 MB and `make data` finishes in < 5 minutes.
#
# Phase A (Hour 2.A — this commit): Himes airway smooth muscle 5 new SRR
# (PRJNA229998 / GSE52778, P1 used 508/509/512; P2 uses 513-517 to avoid
# overlap so the two repos can run independently).
#
# Phase B (Hour 2.B — next commit): add 5 ChIP-seq + 5 ATAC-seq + 5 GTEx-style
# RNA-seq SRRs once their ENA URLs are confirmed. Manifest schema below
# carries the 15 future entries as comments.
#
# License: SRA public-domain (US NIH), per-study terms vary.
# Provenance: ENA mirror (faster than NCBI for chi-mac-p) ftp.sra.ebi.ac.uk

