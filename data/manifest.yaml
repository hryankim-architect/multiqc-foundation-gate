# ===== Phase C augmentation plan (Hour 4-5) =====
# Single-cohort + heavy augmentation strategy. Base 10 SRR -> 50 reports:
#
#   1. Originals (n=10):                      include (clean)
#   2. Module dropout (n=10):                 manual-review (edge cases)
#      - randomly remove 1-2 FastQC modules to simulate upstream tool failures
#   3. Adapter injection (n=10):              exclude (clear fail)
#      - prepend Illumina adapter (50 bp) to 10% of reads -> high adapter content
#   4. Quality degradation (n=10):            exclude (clear fail)
#      - truncate reads to 30 bp + append low-quality bases -> failed per-base-quality
#   5. Mixed-issue (n=10):                    manual-review (boundary)
#      - light adapter (3%) + slight read-length variation + 1 module dropout
#
# Label distribution: include 10 / exclude 20 / manual-review 20.
# Hand-verified by user during Phase C; CSV at data/labels.csv.
#
# Phase D (Hour 6-7): feature extraction parses each multiqc_data.json into
# a ~50-element numerical vector that becomes the MLP / sklearn input.
