# ===== Cohort 2 (Phase B): ENCODE ChIP-seq (5 SRR) =====
# Target: K562 or GM12878 cell line, mix of histone marks (H3K27me3,
# H3K4me3, H3K27ac, etc.) so the FastQC profile differs from bulk RNA-seq
# (different read length distributions, GC content, duplication patterns).
# Pending ENA URL lookup; populate after Phase A succeeds.
#
# ===== Cohort 3 (Phase B): ENCODE ATAC-seq (5 SRR) =====
# Target: same cell line as Cohort 2 for controlled comparison. ATAC-seq
# has distinct sequence-content modules (Tn5 adapter bias) that the
# classifier should learn to recognize.
# Pending ENA URL lookup.
#
# ===== Cohort 4 (Phase B): GTEx-style bulk RNA-seq, different tissue (5 SRR) =====
# Target: lung, liver, or muscle bulk RNA-seq from a different study so
# the classifier sees biological-condition diversity, not just technical
# replicate variation within Himes.
# Pending ENA URL lookup.

# ===== Augmentation plan (Phase C, Hour 4-5) =====
# Each base sample's MultiQC report is augmented into ~2.5 versions:
#   1. Original (n=20)
#   2. Random module dropout: remove 1-2 FastQC modules to simulate
#      "edge case reports" (n=15)
#   3. Adapter injection: prepend 10-50 bp adapter sequence to 5-10% of
#      reads before FastQC to create "exclude" labels (n=15)
# Total: ~50 augmented reports, hand-labeled by user.
